<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="indigo-emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.8" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="#0f172a" />
  
  <!-- Abstract Database/Scanner Shape -->
  <g filter="url(#shadow)">
    <!-- Scanner Glow Grid -->
    <path d="M 128 320 L 384 320 L 320 384 L 192 384 Z" fill="url(#glow)" />
    
    <!-- Top Database Cylinder Layer -->
    <ellipse cx="256" cy="160" rx="96" ry="32" fill="url(#indigo-emerald)" />
    <path d="M 160 160 A 96 32 0 0 0 352 160 V 200 A 96 32 0 0 1 160 200 Z" fill="#4f46e5" opacity="0.85" />
    <ellipse cx="256" cy="200" rx="96" ry="32" fill="url(#indigo-emerald)" />
    
    <!-- Middle Database Cylinder Layer -->
    <path d="M 160 220 A 96 32 0 0 0 352 220 V 260 A 96 32 0 0 1 160 260 Z" fill="#6d28d9" opacity="0.85" />
    <ellipse cx="256" cy="260" rx="96" ry="32" fill="url(#indigo-emerald)" />
    
    <!-- Data Extraction Funnel/Arrow -->
    <path d="M 220 180 L 292 180 L 256 340 Z" fill="#10b981" opacity="0.9" />
    <path d="M 236 340 H 276 V 400 H 236 Z" fill="#10b981" />
    <polygon points="216,390 256,430 296,390" fill="#10b981" />
  </g>
</svg>